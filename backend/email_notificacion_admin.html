<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F9F7F4;
      font-family: 'Inter', sans-serif;
      color: #1C1C1C;
    }
    .wrapper {
      padding: 40px 20px;
      background-color: #F9F7F4;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    }
    .header {
      background-color: #3A4A3E;
      padding: 40px;
      text-align: center;
      color: #F9F7F4;
    }
    .header h1 {
      font-family: 'EB Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      font-style: italic;
      margin: 0;
      letter-spacing: 1px;
    }
    .content {
      padding: 40px;
    }
    .field {
      margin-bottom: 25px;
      border-bottom: 1px solid #F1EFEC;
      padding-bottom: 10px;
    }
    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #A8A29E;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .value {
      font-size: 16px;
      color: #1C1C1C;
      font-style: italic;
      font-family: 'EB Garamond', serif;
    }
    .message-box {
      background-color: #F9F7F4;
      padding: 20px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #57534E;
    }
    .footer {
      padding: 30px;
      text-align: center;
      font-size: 11px;
      color: #A8A29E;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>Nuevo Interés en Despertar Corporal</h1>
      </div>
      <div class="content">
        <div class="field">
          <div class="label">Nombre completo</div>
          <div class="value"><?= nombre ?> <?= apellido ?></div>
        </div>
        <div class="field">
          <div class="label">Correo Electrónico</div>
          <div class="value"><?= email ?></div>
        </div>
        <div class="field">
          <div class="label">Teléfono</div>
          <div class="value"><?= telefono ?></div>
        </div>
        <div class="field">
          <div class="label">Interés Principal</div>
          <div class="value"><?= interes ?></div>
        </div>
        <div class="field">
          <div class="label">Origen de la consulta</div>
          <div class="value"><?= origen ?></div>
        </div>
        
        <div class="label" style="margin-top: 30px;">Mensaje / Comentarios</div>
        <div class="message-box">
          <?= comentarios || 'Sin comentarios adicionales.' ?>
        </div>
      </div>
      <div class="footer">
        SISTEMA DE GESTIÓN DE LEADS · 2026
      </div>
    </div>
  </div>
</body>
</html>
