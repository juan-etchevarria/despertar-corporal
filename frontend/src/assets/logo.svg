  <path d="M100 71 L100 110" stroke="#3A4A3E" stroke-width="1.2" />
  <path d="M100 80 Q115 80 125 95 M100 80 Q85 80 75 95" stroke="#3A4A3E" stroke-width="1.2" fill="none" />
